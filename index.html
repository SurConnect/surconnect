<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurConnect</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header class="navbar">

<div class="logo">
<h2>🎵 SurConnect</h2>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search artists...">
</div>

<div class="join-btn">
<button id="joinBtn">Join Now</button>
</div>

</header>

<section class="hero">
<h1>Find Music Partners</h1>
<p>Connect with Singers, Rappers, Producers & Lyricists.</p>
</section>

<section class="members">

<div class="card">
<img src="https://via.placeholder.com/100">
<h3>Singer Rahul</h3>
<p>Singer • Mumbai</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/100">
<h3>Producer Aman</h3>
<p>Producer • Delhi</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/100">
<h3>Rapper Arjun</h3>
<p>Rapper • Pune</p>
</div>

</section>

<script src="script.js"></script>

</body>
</html>
