<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurConnect</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">
            <h2>🎵 SurConnect</h2>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Search artists...">
        </div>

        <div class="join-btn">
            <button>Join Now</button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Connect with Singers, Rappers, Producers & Lyricists</h1>
        <p>India's growing music collaboration community.</p>
    </section>

    <!-- Members -->
    <section class="members">

        <div class="card">
            <img src="https://via.placeholder.com/100" alt="Profile">
            <h3>Artist Name</h3>
            <p>Singer • Mumbai</p>
            <button>View Profile</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/100" alt="Profile">
            <h3>Artist Name</h3>
            <p>Producer • Delhi</p>
            <button>View Profile</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/100" alt="Profile">
            <h3>Artist Name</h3>
            <p>Rapper • Pune</p>
            <button>View Profile</button>
        </div>

    </section>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
